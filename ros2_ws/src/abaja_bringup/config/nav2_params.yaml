# =============================================================================
# nav2_params.yaml — Nav2 configuration for aBAJA autonomous buggy
# Package: abaja_bringup/config/
#
# ROBOT DIMENSIONS (aBAJA buggy estimates):
#   Length: ~1.8m, Width: ~1.2m, Height: ~1.5m
#   Wheelbase: ~1.1m, Track width: ~1.0m
#   Max speed: 2.0 m/s (Nav2 limited to 0.8 m/s for initial safe testing)
#
# COORDINATE FRAMES:
#   map → odom: published by slam_toolbox
#   odom → base_link: published by Gazebo DiffDrive + ros_gz_bridge /odom
#   base_link → sensors: published by robot_state_publisher
#
# SCAN TOPIC:
#   /lidar/scan — from Gazebo gpu_lidar → ros_gz_bridge
#   Nav2 costmaps are configured to use /lidar/scan directly
#   No /scan alias needed.
#
# CMD_VEL OUTPUT:
#   Nav2 controller_server publishes to /cmd_vel_nav (remapped from /cmd_vel)
#   nav_cmd_to_control_cmd_node converts /cmd_vel_nav → /nav_control_cmd
#   control_mux_node routes /nav_control_cmd through DBW safety pipeline
# =============================================================================

# ── BT Navigator ──────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10             # milliseconds
    default_server_timeout: 20       # seconds
    wait_for_service_timeout: 1000   # milliseconds
    action_server_result_timeout: 900.0  # 15 minutes max mission time
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ── Waypoint Follower ─────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20              # Hz
    stop_on_failure: false     # continue to next waypoint on failure
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: 'wait_at_waypoint'
    wait_at_waypoint:
      plugin: 'nav2_waypoint_follower::WaitAtWaypoint'
      enabled: true
      waypoint_pause_duration: 0   # seconds to pause at each waypoint

# ── Velocity Smoother ─────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0       # Hz
    scale_velocities: false
    feedback: OPEN_LOOP             # OPEN_LOOP or CLOSED_LOOP
    max_velocity: [0.8, 0.0, 0.8]  # [linear.x, linear.y, angular.z] m/s or rad/s
    min_velocity: [-0.5, 0.0, -0.8]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-2.5, 0.0, -2.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Planner Server ────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0  # Hz — lower than TurtleBot (buggy is slower)
    planner_plugins: ['GridBased']
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5          # metres — goal tolerance (larger for buggy)
      use_astar: false         # Dijkstra (false) is safer for narrow paths
      allow_unknown: true      # plan through unexplored areas during SLAM

# ── Smoother Server ───────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ── Controller Server ─────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0   # Hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3       # seconds before declaring failure
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['general_goal_checker']
    controller_plugins: ['FollowPath']

    # Progress checker
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.3   # metres — larger for slow buggy
      movement_time_allowance: 15.0   # seconds before "stuck" declared

    # Goal checker — larger tolerances for buggy
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.5         # metres
      yaw_goal_tolerance: 0.5        # radians (~28°)

    # DWA / MPPI path follower — using DWB (stable, well-tuned)
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.8           # m/s — safe initial speed for buggy
      max_vel_y: 0.0           # non-holonomic: no sideways motion
      max_vel_theta: 0.8       # rad/s — stable turning speed
      min_speed_xy: 0.0
      max_speed_xy: 0.8
      min_speed_theta: 0.0
      acc_lim_x: 1.5           # m/s²
      acc_lim_y: 0.0
      acc_lim_theta: 1.5       # rad/s²
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -1.5
      vx_samples: 20           # trajectory samples
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7            # seconds ahead to simulate
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.5
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ── Behavior Server ───────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0     # Hz
    behavior_plugins:
      - spin
      - back_up
      - drive_on_heading
      - assisted_teleop
      - wait
    spin:
      plugin: nav2_behaviors::Spin
    back_up:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    assisted_teleop:
      plugin: nav2_behaviors::AssistedTeleop
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0    # rad/s — limit spinning for buggy
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5
    max_linear_vel: 0.5        # m/s — slow back-up
    min_linear_vel: 0.15

# ── Lifecycle Manager (Nav2 core) ─────────────────────────────────────────────
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - smoother_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother

# ── Local Costmap ─────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0     # Hz
      publish_frequency: 2.0    # Hz
      global_frame: odom        # local costmap lives in odom frame
      robot_base_frame: base_link
      rolling_window: true
      width: 5                  # metres — local window (large enough for buggy)
      height: 5
      resolution: 0.05          # metres per cell (5cm)
      # aBAJA buggy footprint — approximate rectangle in metres
      # Length 1.8m, Width 1.2m — centred on base_link
      footprint: '[ [0.9, 0.6], [0.9, -0.6], [-0.9, -0.6], [-0.9, 0.6] ]'
      footprint_padding: 0.1    # 10cm safety margin around footprint
      always_send_full_costmap: true
      plugins:
        - voxel_layer
        - inflation_layer
      voxel_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /lidar/scan        # CRITICAL: must match bridge topic
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0  # metres — match LiDAR max range
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0    # exponential cost decay rate
        inflation_radius: 0.55      # metres — 55cm around obstacles (buggy width/2 = 60cm)

  local_costmap_client:
    ros__parameters:
      use_sim_time: true

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: true

# ── Global Costmap ────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0     # Hz — global costmap updates slowly
      publish_frequency: 1.0    # Hz
      global_frame: map
      robot_base_frame: base_link
      # Same footprint as local costmap
      footprint: '[ [0.9, 0.6], [0.9, -0.6], [-0.9, -0.6], [-0.9, 0.6] ]'
      footprint_padding: 0.1
      resolution: 0.05
      track_unknown_space: true   # SLAM maps: unknown space allowed
      always_send_full_costmap: true
      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /lidar/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

  global_costmap_client:
    ros__parameters:
      use_sim_time: true

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: true

# ── Map Server (used in localization mode, not SLAM mode) ─────────────────────
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ''   # set via launch argument if loading saved map

# ── Map Saver ─────────────────────────────────────────────────────────────────
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ── Lifecycle Manager (SLAM) ──────────────────────────────────────────────────
lifecycle_manager_slam:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
